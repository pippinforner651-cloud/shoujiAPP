version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chinarun-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vr_china
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chinarun-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/vr_china?schema=public
      PORT: 3001
    depends_on:
      - postgres

volumes:
  pgdata:
