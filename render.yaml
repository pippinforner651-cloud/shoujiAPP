# Render Blueprint — 一键部署配置文件
# 使用方式：登录 Render → New Blueprint → 连接此仓库 → Apply

databases:
  - name: chinarun-db
    databaseName: vr_china
    user: chinarun_user
    plan: free
    region: singapore
    ipAllowList: []  # 仅允许 Render 内部服务访问

services:
  - type: web
    name: chinarun-api
    runtime: node
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    healthCheckPath: /health
    autoDeploy: true

    buildCommand: |
      npm ci
      npx prisma generate
      npm run build
      npx prisma migrate deploy

    startCommand: node dist/server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: chinarun-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://pippinforner651-cloud.github.io/shoujiAPP
      - key: LOG_LEVEL
        value: info
