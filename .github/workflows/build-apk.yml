name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL (e.g. https://chinarun-api.onrender.com)'
        required: false
        default: ''
        type: string
  push:
    branches: [main, master, release]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set API Base URL
        run: |
          API_URL="${{ inputs.api_base_url || vars.VITE_API_BASE_URL || 'https://chinarun-api.onrender.com' }}"
          echo "VITE_API_BASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "Using API: $API_URL"

      - name: Install Dependencies
        working-directory: frontend
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      # ============================================
      # 1. DEBUG APK — 自动签名，可安装
      # ============================================
      - name: Build Debug APK
        working-directory: frontend/android
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify Debug APK Signature
        run: |
          DEBUG_APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_APK" ]; then
            echo "✅ Debug APK exists"
            ls -lh "$DEBUG_APK"
            # 验证签名
            $ANDROID_SDK_ROOT/build-tools/*/apksigner verify --verbose --print-certs "$DEBUG_APK" 2>&1 || echo "apksigner not available, skipping verify"
            # SHA256
            sha256sum "$DEBUG_APK"
          else
            echo "❌ Debug APK not found!"
            exit 1
          fi

      - name: Rename Debug APK for Delivery
        run: |
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             全民环游中国_V1.0_安卓测试版.apk
          echo "DEBUG_APK_SHA=$(sha256sum 全民环游中国_V1.0_安卓测试版.apk | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 全民环游中国_V1.0_安卓测试版
          path: 全民环游中国_V1.0_安卓测试版.apk
          retention-days: 30

      # ============================================
      # 2. RELEASE APK — 仅当 Secrets 配置时才签名
      # ============================================
      - name: Build Release APK
        working-directory: frontend/android
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK with Secrets
        if: >
          secrets.ANDROID_KEYSTORE_BASE64 != '' &&
          secrets.ANDROID_KEYSTORE_PASSWORD != '' &&
          secrets.ANDROID_KEY_ALIAS != '' &&
          secrets.ANDROID_KEY_PASSWORD != ''
        working-directory: frontend/android
        run: |
          # 从 Secret 恢复 keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > chinarun-release.jks

          # 复制 unsigned APK
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/app-release-signed.apk"
          cp "$UNSIGNED" "$SIGNED"

          # 配置签名环境变量
          export ANDROID_KEYSTORE_FILE="$PWD/chinarun-release.jks"
          export ANDROID_KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          export ANDROID_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          export ANDROID_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

          # 通过 jarsigner 签名
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$ANDROID_KEYSTORE_FILE" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            "$SIGNED" "$ANDROID_KEY_ALIAS"

          # zipalign
          $ANDROID_SDK_ROOT/build-tools/*/zipalign -v -p 4 \
            "$SIGNED" \
            app/build/outputs/apk/release/app-release.apk

          # 验证签名
          $ANDROID_SDK_ROOT/build-tools/*/apksigner verify --verbose --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Deliver Release APK (if signed)
        if: >
          secrets.ANDROID_KEYSTORE_BASE64 != '' &&
          secrets.ANDROID_KEYSTORE_PASSWORD != '' &&
          secrets.ANDROID_KEY_ALIAS != '' &&
          secrets.ANDROID_KEY_PASSWORD != ''
        run: |
          cp frontend/android/app/build/outputs/apk/release/app-release.apk \
             全民环游中国_V1.0_安卓正式版.apk
          echo "RELEASE_APK_SHA=$(sha256sum 全民环游中国_V1.0_安卓正式版.apk | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Upload Release APK Artifact (if signed)
        if: >
          secrets.ANDROID_KEYSTORE_BASE64 != '' &&
          secrets.ANDROID_KEYSTORE_PASSWORD != '' &&
          secrets.ANDROID_KEY_ALIAS != '' &&
          secrets.ANDROID_KEY_PASSWORD != ''
        uses: actions/upload-artifact@v4
        with:
          name: 全民环游中国_V1.0_安卓正式版
          path: 全民环游中国_V1.0_安卓正式版.apk
          retention-days: 30

      - name: Mark Unsigned Release as Not For Delivery
        if: >
          secrets.ANDROID_KEYSTORE_BASE64 == '' ||
          secrets.ANDROID_KEYSTORE_PASSWORD == '' ||
          secrets.ANDROID_KEY_ALIAS == '' ||
          secrets.ANDROID_KEY_PASSWORD == ''
        run: |
          echo "============================================"
          echo "⚠️  未配置签名 Secrets"
          echo ""
          echo "  app-release-unsigned.apk 已生成但不可安装。"
          echo "  只交付 Debug APK 用于测试。"
          echo ""
          echo "  要生成正式签名版，请配置以下 Secrets："
          echo "    ANDROID_KEYSTORE_BASE64"
          echo "    ANDROID_KEYSTORE_PASSWORD"
          echo "    ANDROID_KEY_ALIAS"
          echo "    ANDROID_KEY_PASSWORD"
          echo ""
          echo "  Secrets 配置位置："
          echo "    Settings → Secrets and variables → Actions"
          echo "============================================"
