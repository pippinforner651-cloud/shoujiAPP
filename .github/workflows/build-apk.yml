name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL (e.g. https://chinarun-api.onrender.com)'
        required: false
        default: ''
        type: string
  push:
    branches: [main, master, release]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set API Base URL
        run: |
          API_URL="${{ inputs.api_base_url || vars.VITE_API_BASE_URL || 'https://chinarun-api.onrender.com' }}"
          echo "VITE_API_BASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "Using API: $API_URL"

      - name: Install Dependencies
        working-directory: frontend
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: frontend/android
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify Debug APK Signature
        run: |
          DEBUG_APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$DEBUG_APK" ]; then
            echo "Debug APK not found"
            exit 1
          fi

          echo "Debug APK exists"
          ls -lh "$DEBUG_APK"
          sha256sum "$DEBUG_APK"

          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)

          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found"
            exit 1
          fi

          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$DEBUG_APK"

      - name: Rename Debug APK for Delivery
        run: |
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             全民环游中国_V1.0_安卓测试版.apk
          echo "SHA256=$(sha256sum 全民环游中国_V1.0_安卓测试版.apk | cut -d' ' -f1)"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 全民环游中国_V1.0_安卓测试版
          path: 全民环游中国_V1.0_安卓测试版.apk
          retention-days: 30
